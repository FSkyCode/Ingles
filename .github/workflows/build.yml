name: Build APK

on: [push]

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout repo
     uses: actions/checkout@v3

   - name: Build APK
     uses: ArtemSBulgakov/buildozer-action@v1

   - name: Upload APK
     uses: actions/upload-artifact@v4
     with:
       name: apk
       path: bin/*.apk
